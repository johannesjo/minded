name: Release

on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+']

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

env:
  NODE_VERSION: '22'

jobs:
  verify-version:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Tag must be reachable from main
        run: |
          git fetch --no-tags --depth=1 origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main \
            || { echo "Tag $GITHUB_REF_NAME is not reachable from origin/main"; exit 1; }
      - name: Tag must match package.json and gradle versionName
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./extension/package.json').version")
          GRADLE=$(grep -oP 'versionName\s*=\s*"\K[^"]+' android/app/build.gradle.kts)
          if [ "$TAG" != "$PKG" ] || [ "$TAG" != "$GRADLE" ]; then
            echo "Version mismatch: tag=$TAG package.json=$PKG gradle=$GRADLE"
            exit 1
          fi

  release-chrome:
    needs: verify-version
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: extension/package-lock.json
      - name: Build extension
        working-directory: extension
        run: |
          npm ci
          npm run lint
          npm test
          npm run build
      - name: Upload to Chrome Web Store (auto-submit for review)
        working-directory: extension
        env:
          CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
          EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
        run: npx --yes chrome-webstore-upload-cli@3 upload --source minded.zip --auto-publish

  release-play:
    needs: verify-version
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: extension/package-lock.json
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - name: Build web assets for Android
        working-directory: extension
        run: |
          npm ci
          npm run buildDroid
      - name: Decode keystore
        env:
          KS: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: printf '%s' "$KS" | base64 -d > "$RUNNER_TEMP/upload.jks"
      - name: Build signed AAB
        working-directory: android
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/upload.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew bundleRelease
      - name: Upload to Play Store (internal track)
        uses: r0adkll/upload-google-play@e738b9dd8f2476ea806d921b64aacd24f34515a5 # v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.minded.minded
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
      - name: Cleanup keystore
        if: always()
        run: rm -f "$RUNNER_TEMP/upload.jks"

  github-release:
    needs: [release-chrome, release-play]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes --verify-tag
