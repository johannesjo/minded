name: Update store screenshots

on:
  workflow_dispatch:
    inputs:
      language:
        description: Google Play listing language
        required: true
        default: en-US
        type: string
      confirm:
        description: Replace the live Google Play phone screenshots
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  # Do not commit a listing edit while the production release workflow is
  # committing a binary edit for the same Play app.
  group: release
  cancel-in-progress: false

env:
  NODE_VERSION: "22"

jobs:
  google-play:
    if: inputs.confirm
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            extension/package-lock.json
            .github/scripts/package-lock.json
      - name: Generate screenshots
        working-directory: extension
        run: |
          npm ci
          npm run screenshots:install
          npm run screenshots
      - name: Install upload dependencies
        working-directory: .github/scripts
        run: npm ci
      - name: Replace Google Play phone screenshots
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          PACKAGE_NAME: com.minded.minded
          LANGUAGE: ${{ inputs.language }}
          SCREENSHOT_DIR: extension/screenshots/google-play/phone
        run: node .github/scripts/upload-play-screenshots.mjs
