<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>minded — styleguide</title>
    <script>
      // Standalone-mode shim: webextension-polyfill (used by util/browser.ts)
      // throws on load when chrome.runtime is missing. Provide just enough
      // surface for it to import without errors. Storage methods return empty.
      if (typeof globalThis.chrome === "undefined" || !globalThis.chrome.runtime) {
        const noopStorage = {
          get: async () => ({}),
          set: async () => undefined,
          remove: async () => undefined,
          clear: async () => undefined,
        };
        globalThis.chrome = {
          runtime: {
            id: "styleguide-standalone",
            getURL: (p) => p,
            getManifest: () => ({}),
            sendMessage: () => undefined,
            onMessage: { addListener: () => undefined, removeListener: () => undefined },
          },
          storage: { sync: noopStorage, local: noopStorage },
        };
      }
    </script>
    <style>
      html, body { margin: 0; padding: 0; min-height: 100vh; }
      /* Standalone-only: in the real app this gradient lives on
         #minded-6622-coloured-wrapper, which the styleguide entry skips.
         The grain --grain-tile is shared (defined in _variables.scss). */
      #minded-6622 {
        display: block;
        position: relative;
        min-height: 100vh;
        background: var(--background-gradient);
        background-size: 180% 180%, 170% 170%, 200% 160%, 100% 100%;
        background-position: 0% 0%, 100% 0%, 50% 100%, 0% 0%;
        background-repeat: no-repeat;
        animation: minded-sg-bg-drift 90s ease-in-out infinite alternate;
        color: var(--c-fg);
      }
      @keyframes minded-sg-bg-drift {
        0%   { background-position: 0% 0%, 100% 0%, 50% 100%, 0% 0%; }
        100% { background-position: 100% 100%, 0% 100%, 50% 0%, 0% 0%; }
      }
      @media (prefers-reduced-motion: reduce) {
        #minded-6622 { animation: none; }
      }
      #minded-6622::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: -1;
        opacity: 0.12;
        mix-blend-mode: overlay;
        background-image: var(--grain-tile);
        background-size: 180px 180px;
      }
      #minded-6622.minded-6622-dark::after {
        opacity: 0.18;
        mix-blend-mode: screen;
      }
    </style>
  </head>
  <body>
    <div id="minded-6622"></div>
    <script src="entry.tsx" type="module"></script>
  </body>
</html>
