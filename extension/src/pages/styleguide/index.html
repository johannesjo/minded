<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>minded — styleguide</title>
    <script>
      // Standalone-mode shim: webextension-polyfill (used by util/browser.ts)
      // throws on load when chrome.runtime is missing. Provide just enough
      // surface for it to import without errors. Storage methods return empty.
      if (typeof globalThis.chrome === "undefined" || !globalThis.chrome.runtime) {
        const noopStorage = {
          get: async () => ({}),
          set: async () => undefined,
          remove: async () => undefined,
          clear: async () => undefined,
        };
        globalThis.chrome = {
          runtime: {
            id: "styleguide-standalone",
            getURL: (p) => p,
            getManifest: () => ({}),
            sendMessage: () => undefined,
            onMessage: { addListener: () => undefined, removeListener: () => undefined },
          },
          storage: { sync: noopStorage, local: noopStorage },
        };
      }
    </script>
    <style>
      html, body { margin: 0; padding: 0; min-height: 100vh; }
      /* Standalone-only: in the real app this gradient lives on
         #minded-6622-coloured-wrapper, which the styleguide entry skips. */
      #minded-6622 {
        display: block;
        min-height: 100vh;
        background: var(--background-gradient);
        color: var(--c-fg);
      }
    </style>
  </head>
  <body>
    <div id="minded-6622"></div>
    <script src="entry.tsx" type="module"></script>
  </body>
</html>
